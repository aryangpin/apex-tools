<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame Width Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1916;
    --muted: #8a8880;
    --accent: #1a1916;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .wrap { width: 100%; max-width: 420px; }

  .title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    background: var(--accent);
    color: #fff;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  .result-card {
    background: var(--accent);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .result-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 130px; height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .result-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
  }

  .result-value {
    font-family: 'DM Mono', monospace;
    font-size: 52px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
  }

  .result-unit {
    font-size: 18px;
    color: rgba(255,255,255,0.4);
    margin-left: 4px;
    letter-spacing: 0;
  }

  .breakdown {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .bd-item {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .bd-key {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .bd-val {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .card-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .field {
    display: flex;
    align-items: center;
    padding: 11px 20px;
    gap: 10px;
    border-bottom: 1px solid var(--bg);
    transition: background 0.12s;
  }

  .field:last-child { border-bottom: none; }
  .field:hover { background: var(--bg); }

  .field-label {
    flex: 1;
    font-size: 13px;
    color: var(--text);
  }

  .field-formula {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
  }

  .field-computed {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: #b8860b;
    min-width: 40px;
    text-align: right;
  }

  input[type="number"] {
    width: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 6px 10px;
    text-align: right;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(26,25,22,0.07);
  }

  input::-webkit-inner-spin-button { opacity: 0.3; }

  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.22s ease; }
</style>
</head>
<body>
<div class="wrap">

  <div class="title-row">
    <h1>Frame Width Calculator</h1>
    <div class="tag">APEX JAYA</div>
  </div>

  <div class="result-card">
    <div class="result-label">NET WIDTH</div>
    <div class="result-value" id="result">940<span class="result-unit">mm</span></div>
    <div class="breakdown">
      <div class="bd-item">
        <div class="bd-key">FRAME WIDTH</div>
        <div class="bd-val" id="bd-fw">1000</div>
      </div>
      <div class="bd-item">
        <div class="bd-key">DEDUCT</div>
        <div class="bd-val" id="bd-deduct">−60</div>
      </div>
      <div class="bd-item">
        <div class="bd-key">BALANCE</div>
        <div class="bd-val" id="bd-bal">27</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">输入参数</div>
    <div class="field">
      <div class="field-label">Frame Width</div>
      <input type="number" id="frameWidth" value="1000" oninput="calc()">
    </div>
    <div class="field">
      <div class="field-label">Profile Y</div>
      <input type="number" id="profileY" value="40" oninput="calc()">
    </div>
    <div class="field">
      <div class="field-label">Profile X</div>
      <input type="number" id="profileX" value="160" oninput="calc()">
    </div>
    <div class="field">
      <div class="field-label">Stop Gap</div>
      <input type="number" id="stopGap" value="13" oninput="calc()">
    </div>
    <div class="field">
      <div class="field-label">Gap</div>
      <input type="number" id="gap" value="3" oninput="calc()">
    </div>
  </div>

  <div class="card">
    <div class="card-header">自动计算</div>
    <div class="field">
      <div class="field-label">Balance</div>
      <div class="field-formula">Profile Y − Stop Gap</div>
      <div class="field-computed" id="show-bal">27</div>
    </div>
    <div class="field">
      <div class="field-label">Width Deduct</div>
      <div class="field-formula">(Bal×2)+(Gap×2)</div>
      <div class="field-computed" id="show-deduct">60</div>
    </div>
  </div>

</div>

<script>
function calc() {
  const fw  = parseFloat(document.getElementById('frameWidth').value) || 0;
  const py  = parseFloat(document.getElementById('profileY').value)   || 0;
  const sg  = parseFloat(document.getElementById('stopGap').value)    || 0;
  const gap = parseFloat(document.getElementById('gap').value)        || 0;

  const bal    = py - sg;
  const deduct = (bal * 2) + (gap * 2);
  const net    = fw - deduct;

  document.getElementById('show-bal').textContent    = bal;
  document.getElementById('show-deduct').textContent = deduct;
  document.getElementById('bd-fw').textContent       = fw;
  document.getElementById('bd-deduct').textContent   = '−' + deduct;
  document.getElementById('bd-bal').textContent      = bal;

  const el = document.getElementById('result');
  el.innerHTML = net + '<span class="result-unit">mm</span>';
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}
calc();
</script>
</body>
</html>
