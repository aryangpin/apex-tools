<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Material Length Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --accent-dim: #c8df30;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --red: #ff4f4f;
    --green: #4fffb0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 560px;
  }

  header {
    margin-bottom: 2rem;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .table-header {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 100px;
    gap: 0;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .th {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: center;
  }

  .th:last-child { text-align: right; }

  .row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 100px;
    gap: 0;
    padding: 6px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.15s;
  }

  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(255,255,255,0.02); }

  .row-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }

  .row input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    width: 100%;
    padding: 6px 8px;
    text-align: center;
    border-radius: 6px;
    transition: background 0.15s;
  }

  .row input:focus {
    background: rgba(232, 255, 71, 0.06);
  }

  .row input::placeholder { color: var(--text-dim); }

  .row-result {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    text-align: right;
    padding-right: 4px;
    transition: color 0.2s;
  }

  .row-result.active { color: var(--text); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 1.5rem;
  }

  .results {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    position: relative;
    overflow: hidden;
  }

  .result-card.primary {
    border-color: var(--accent);
  }

  .result-card.primary::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .result-card.secondary::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--green);
  }

  .result-card.secondary { border-color: var(--green); }

  .result-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .result-value {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .result-card.primary .result-value { color: var(--accent); }
  .result-card.secondary .result-value { color: var(--green); }

  .result-unit {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  .total-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .total-label {
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .total-value {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .actions {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
  }

  .btn-clear {
    background: transparent;
    color: var(--text-muted);
  }

  .btn-clear:hover {
    background: var(--surface2);
    color: var(--text);
  }

  .btn-download {
    background: var(--accent);
    color: #0f0f0f;
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn-download:hover {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
  }

  footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">APEX JAYA · Material Calculator</div>
    <h1>Length Calculator</h1>
    <p class="subtitle">输入 Y × X，自动计算 Single Leaf / Double</p>
  </header>

  <div class="table-wrap">
    <div class="table-header">
      <div class="th">#</div>
      <div class="th">Y</div>
      <div class="th">X</div>
      <div class="th" style="text-align:right;">Y × X</div>
    </div>
    <div id="rows"></div>
  </div>

  <div class="total-bar">
    <span class="total-label">Total sum</span>
    <span class="total-value" id="total-sum">0</span>
  </div>

  <div class="results">
    <div class="result-card primary">
      <div class="result-label">Single Leaf</div>
      <div class="result-value" id="single">0.00</div>
      <div class="result-unit">meter</div>
    </div>
    <div class="result-card secondary">
      <div class="result-label">Double</div>
      <div class="result-value" id="double">0.00</div>
      <div class="result-unit">meter</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-clear" onclick="clearAll()">Clear all</button>
    <button class="btn-download" onclick="downloadCSV()">Download CSV</button>
  </div>

  <footer>apexjaya-tools.site · material length calc v1.0</footer>
</div>

<script>
const ROW_COUNT = 8;
const rows = document.getElementById('rows');

for (let i = 0; i < ROW_COUNT; i++) {
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `
    <div class="row-num">${i + 1}</div>
    <input type="number" id="y${i}" placeholder="—" min="0" oninput="calc()" />
    <input type="number" id="x${i}" placeholder="—" min="0" oninput="calc()" />
    <div class="row-result" id="r${i}">—</div>
  `;
  rows.appendChild(div);
}

function calc() {
  let total = 0;
  for (let i = 0; i < ROW_COUNT; i++) {
    const y = parseFloat(document.getElementById('y' + i).value) || 0;
    const x = parseFloat(document.getElementById('x' + i).value) || 0;
    const r = y * x;
    const el = document.getElementById('r' + i);
    if (y && x) {
      el.textContent = r.toLocaleString();
      el.classList.add('active');
    } else {
      el.textContent = '—';
      el.classList.remove('active');
    }
    total += r;
  }
  const single = total / 1000;
  const singleCeil = Math.ceil(single * 10) / 10;
  const doubleCeil = Math.ceil(single * 2 * 10) / 10;
  document.getElementById('total-sum').textContent = total.toLocaleString();
  document.getElementById('single').textContent = singleCeil.toFixed(1);
  document.getElementById('double').textContent = doubleCeil.toFixed(1);
}

function clearAll() {
  for (let i = 0; i < ROW_COUNT; i++) {
    document.getElementById('y' + i).value = '';
    document.getElementById('x' + i).value = '';
    document.getElementById('r' + i).textContent = '—';
    document.getElementById('r' + i).classList.remove('active');
  }
  document.getElementById('total-sum').textContent = '0';
  document.getElementById('single').textContent = '0.00';
  document.getElementById('double').textContent = '0.00';
}

function downloadCSV() {
  const rows = [['Row', 'Y', 'X', 'Y x X']];
  let total = 0;
  for (let i = 0; i < ROW_COUNT; i++) {
    const y = parseFloat(document.getElementById('y' + i).value) || 0;
    const x = parseFloat(document.getElementById('x' + i).value) || 0;
    const r = y * x;
    total += r;
    rows.push([i + 1, y || '', x || '', r || '']);
  }
  const single = total / 1000;
  const singleCeil = (Math.ceil(single * 10) / 10).toFixed(1);
  const doubleCeil = (Math.ceil(single * 2 * 10) / 10).toFixed(1);
  rows.push(['', '', '', '']);
  rows.push(['Total', '', '', total]);
  rows.push(['Single Leaf (m)', '', '', singleCeil]);
  rows.push(['Double (m)', '', '', doubleCeil]);

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'material-length-' + new Date().toISOString().slice(0, 10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
